<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵喵宠物店 - 管理员登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            display: flex;
            width: 900px;
            max-width: 100%;
            height: auto;
            min-height: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        
        .login-left {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 35px;
        }
        
        .logo-section i {
            font-size: 36px;
            color: #FF6B9D;
        }
        
        .logo-section span {
            font-size: 24px;
            font-weight: 700;
            color: #1D1D1F;
        }
        
        .login-left h2 {
            font-size: 28px;
            color: #1D1D1F;
            margin-bottom: 10px;
        }
        
        .login-left p {
            color: #86868B;
            font-size: 14px;
            margin-bottom: 40px;
        }
        
        .form-group {
            margin-bottom: 22px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1D1D1F;
            margin-bottom: 8px;
        }
        
        .form-group .input-box {
            position: relative;
        }
        
        .form-group .input-box .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #86868B;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px 16px 15px 50px;
            border: 1px solid #E8E8ED;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            background: #FAFAFA;
        }
        
        .form-group input:focus {
            border-color: #FF6B9D;
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.08);
            background: white;
        }
        
        .form-group input::placeholder {
            color: #C7C7CC;
        }
        
        .remember-box {
            display: flex;
            align-items: center;
            margin-bottom: 28px;
        }
        
        .remember-box label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #636366;
            cursor: pointer;
        }
        
        .remember-box input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #FF6B9D;
            padding: 0;
            margin: 0;
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FF6B9D 0%, #FF4785 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.4);
        }
        
        .hint {
            text-align: center;
            margin-top: 20px;
            color: #86868B;
            font-size: 13px;
        }
        
        .hint strong {
            color: #FF6B9D;
            font-weight: 600;
        }
        
        .login-right {
            flex: 1;
            background: linear-gradient(135deg, #FF6B9D 0%, #FF4785 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px;
            color: white;
            text-align: center;
        }
        
        .login-right .icon-wrap {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }
        
        .login-right .icon-wrap i {
            font-size: 50px;
        }
        
        .login-right h3 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .login-right p {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .features {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .feature-item .check {
            width: 22px;
            height: 22px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }
        
        .feature-item span {
            font-size: 13px;
            opacity: 0.9;
        }
        
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                width: 100%;
            }
            
            .login-left, .login-right {
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="logo-section">
                <i class="fas fa-cat"></i>
                <span>喵喵宠物店</span>
            </div>
            <h2>欢迎回来</h2>
            <p>请登录您的管理员账号</p>
            
            <div class="form-group">
                <label>用户名</label>
                <div class="input-box">
                    <span class="icon"><i class="fas fa-user"></i></span>
                    <input type="text" id="username" placeholder="请输入用户名">
                </div>
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <div class="input-box">
                    <span class="icon"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" placeholder="请输入密码">
                </div>
            </div>
            
            <div class="remember-box">
                <label>
                    <input type="checkbox">
                    <span>记住我</span>
                </label>
            </div>
            
            <button class="login-btn" onclick="handleLogin()">登录</button>
            
            <p class="hint">默认账号: <strong>admin</strong> / <strong>admin</strong></p>
        </div>
        
        <div class="login-right">
            <div class="icon-wrap">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h3>管理员后台</h3>
            <p>管理店铺数据、订单和用户信息</p>
            
            <div class="features">
                <div class="feature-item">
                    <span class="check"><i class="fas fa-check"></i></span>
                    <span>实时数据监控</span>
                </div>
                <div class="feature-item">
                    <span class="check"><i class="fas fa-check"></i></span>
                    <span>订单管理系统</span>
                </div>
                <div class="feature-item">
                    <span class="check"><i class="fas fa-check"></i></span>
                    <span>用户信息管理</span>
                </div>
                <div class="feature-item">
                    <span class="check"><i class="fas fa-check"></i></span>
                    <span>商品库存管理</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function handleLogin() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            if (username === 'admin' && password === 'admin') {
                window.location.href = 'index.html';
            } else {
                alert('用户名或密码错误');
            }
        }
    </script>
</body>
</html>
